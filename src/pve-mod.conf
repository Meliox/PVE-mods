# pve-mod configuration file
# Run 'pve-mod-configure' to set values interactively.
# All flags are 0 (disabled) by default; pve-mod-configure enables them.

[modules]
node_info=0
nag_screen=0

[gpu]
intel_enabled=0
nvidia_enabled=0
amd_enabled=0
gpu_history=0

[lm_sensors]
enabled=0
enable_cpu=0
cpu_temp_target=Core
enable_ram_temp=0
enable_hdd_temp=0
enable_nvme_temp=0
enable_fan_speed=0
display_zero_speed_fans=0
temp_unit=C

[ups]
enabled=0
device_name=ups@localhost

[system_info]
enabled=0
type=1

[pve_trigger]
enabled=0

[service]
mode=embedded

# Debug mode: when a mode is 1, the real tool is not required.
# Data is read from the file path instead. Useful for development/testing.
[debug]
lm_sensors_mode=0
lm_sensors_output_file=/tmp/sensors-output.json
intel_mode=0
intel_devices_file=/tmp/intel-gpu-devices.json
nvidia_mode=0
nvidia_devices_file=/tmp/nvidia-smi-devices.csv
nvidia_output_file=/tmp/nvidia-smi-output.csv
amd_mode=0
amd_devices_file=/tmp/amd-gpu-devices.json
ups_mode=0
ups_output_file=/tmp/ups-output.json
log_enabled=0
log_file=/tmp/pve-mod-debug.log
