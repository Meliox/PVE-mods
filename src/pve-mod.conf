# pve-mod configuration file
# Run 'pve-mod-configure' to set values interactively.
# All flags are 0 (disabled) by default; pve-mod-configure enables them.

[modules]
node_info=0
nag_screen=0

[gpu]
intel_enabled=0
nvidia_enabled=0
amd_enabled=0
gpu_history=0

[lm_sensors]
enabled=0
enable_cpu=0
cpu_temp_target=Core
enable_ram_temp=0
enable_hdd_temp=0
enable_nvme_temp=0
enable_fan_speed=0
display_zero_speed_fans=0
temp_unit=C

[ups]
enabled=0
device_name=ups@localhost

[system_info]
enabled=0
type=1

[pve_trigger]
enabled=0

[service]
mode=embedded
